name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    # Fast static-only lint on Linux. Doesn't need MLX installed (which is
    # Apple-Silicon-only), so we get sub-30s feedback on style / unused
    # imports / sort order before burning macos-14 minutes on the test
    # matrix. Pyright stays in the macos job below since it needs to
    # import-resolve mlx.
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check mlx_turboquant/ tests/

  test:
    name: pytest macOS ARM py${{ matrix.python-version }}
    needs: lint
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          # scipy is required by the Lloyd-Max codebook generation tests
          pip install -e ".[dev]"
          pip install pyyaml

      - name: Show environment
        run: |
          python --version
          python -c "import mlx_turboquant; print('mlx-turboquant', mlx_turboquant.__version__)"

      - name: Lint (ruff)
        run: ruff check mlx_turboquant/ tests/

      - name: Type-check (pyright)
        run: pyright

      - name: Smoke tests (fail fast — public API contract)
        run: python -m pytest tests/test_smoke.py -v

      - name: CLI entry point smoke
        run: mlx-turboquant --help

      - name: Run unit tests
        # test_integration.py is the @pytest.mark.slow real-model test
        # (downloads multi-GB checkpoints); run it manually before release.
        run: python -m pytest tests/ -q --ignore=tests/test_integration.py

      - name: Coverage report
        # Coverage runs against the same suite — fast since pytest-cov
        # piggybacks on the existing collection. Threshold gated at 90%
        # (current is ~95%); ~5pp headroom prevents the gate from
        # blocking unrelated PRs while still failing on a real drop.
        if: matrix.python-version == '3.12'
        run: python -m pytest tests/ -q --ignore=tests/test_integration.py --cov=mlx_turboquant --cov-report=term --cov-fail-under=90
